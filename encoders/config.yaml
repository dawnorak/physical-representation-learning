dataset:
  name: active_matter
  num_frames: 16
  num_frames_per_patch: 2
  num_chans: 11
  resolution: 128
  offset: 1
model:
  dims:
  - 16
  - 32
  - 64
  - 128
  num_res_blocks:
  - 3
  - 3
  - 9
  - 3
  name: cnn
  objective: jepa
ft:
  num_epochs: 100
  lr: 0.001
  batch_size: 32
  report_every: 100
  save_every: 10
  head_type: linear
  embeddings_dir: ./embeddings
  task: regression
  use_attentive_pooling: true
  lr_scheduler: cosine
  lr_scheduler_warmup_epochs: 2
  min_lr: 0
  weight_decay: 0.01
  noise_std: 1.0
  run_name: activematter-jepa-FT-noise-std-1.0
  distributed: false
train:
  num_epochs: 20
  batch_size: 24
  report_every: 100
  save_every: 5
  include_labels: false
  sim_coeff: 2
  std_coeff: 40
  cov_coeff: 2
  predict_n_steps: false
  lr_scheduler: cosine
  lr_scheduler_warmup_epochs: 2
  min_lr: 1.0e-06
  lr: 0.001
  weight_decay: 0.05
  noise_std: 1.0
  temporal_masking: true
  future_mask_frames: 4
  multi_scale_temporal_context: true
  multi_scale_temporal_stride: 4
  precision: fp32
  run_name: am_temporal_masking_a100
  distributed: false
  save_every_steps: 2000
out_path: ./checkpoints
cache_path: ./dataset_cache
dry_run: false
